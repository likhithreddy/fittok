name: Publish to PyPI + MCP Registry

# On every release tag: build once, publish to PyPI via OIDC trusted publishing
# (no token needed), then register server.json with the MCP Registry.
#
# One-time setup: add GitHub as a Trusted Publisher for fittok on PyPI:
#   https://pypi.org/manage/project/fittok/publishing/
#   Owner: likhithreddy · Repo: fittok · Workflow name: publish-mcp.yml
#   (Environment: leave blank)
# Without this, the PyPI step will fail.

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC for PyPI trusted publishing AND mcp-publisher
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build
        run: uv build

      - name: Publish to PyPI (trusted publishing, no token)
        run: uv publish

      - name: Sync server.json version to the git tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          python3 -c "
          import json, sys
          v = sys.argv[1]
          d = json.load(open('server.json'))
          d['version'] = v
          for pkg in d.get('packages', []):
              pkg['version'] = v
          json.dump(d, open('server.json', 'w'), indent=2)
          " "$VERSION"

      - name: Download MCP Publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/download/latest/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Publish to MCP Registry
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish
